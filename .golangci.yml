version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign

formatters:
  enable:
    - gofmt
    - goimports

  settings:
    goimports:
      local-prefixes: gaslands.tools

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
