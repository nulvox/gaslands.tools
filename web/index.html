<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gaslands.tools — Team Roster Builder</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/print.css">
</head>
<body>
  <button class="theme-toggle" id="theme-toggle" title="Toggle light/dark mode">&#9788;</button>

  <div class="app-header">
    <h1>GASLANDS.TOOLS</h1>
    <div class="subtitle">Team Roster Builder</div>
  </div>

  <div class="tab-bar" id="tab-bar">
    <button class="tab-new" id="tab-new" title="New Team">+</button>
  </div>

  <div class="budget-bar" id="budget-bar" style="display:none"></div>

  <div class="main-content" id="main-content">
    <div id="loading-status" class="loading-status">Loading WASM...</div>
  </div>

  <footer class="site-footer">
    <a href="https://github.com/nulvox/gaslands.tools" target="_blank" rel="noopener">gaslands.tools</a>
    is licensed under
    <a href="https://opensource.org/licenses/MIT" target="_blank" rel="noopener">MIT</a>
  </footer>

  <script src="wasm_exec.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/vehicle-ui.js"></script>
  <script src="js/team-ui.js"></script>
  <script src="js/tabs.js"></script>
  <script src="js/import-export.js"></script>
  <script src="js/share.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
